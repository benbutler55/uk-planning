name: Validate and Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Validate data schemas
        run: python3 scripts/validate_data.py

      - name: Build static site
        run: python3 scripts/build_site.py

      - name: Verify generated site is committed
        run: git diff --exit-code -- site

      - name: Check internal links
        run: python3 scripts/check_links.py

      - name: Check metric drift thresholds
        run: python3 scripts/check_metric_drift.py

      - name: Check accessibility basics
        run: python3 scripts/check_accessibility.py
