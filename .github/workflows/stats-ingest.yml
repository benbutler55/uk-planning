name: Quarterly Statistics Ingest Check

on:
  schedule:
    - cron: "0 9 1 1,4,7,10 *"  # 1st of Jan, Apr, Jul, Oct at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Run statistics ingest check
        run: python3 scripts/ingest_govuk_stats.py --warn-only --append-history

      - name: Upload ingest report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: stats-ingest-report
          path: |
            stats-ingest-report.txt
            stats-ingest-report.json
            stats-ingest-history.json
          retention-days: 90
